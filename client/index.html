<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/hero.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serene Hotel</title>
    <style>
      /* Preloader styles - shows immediately */
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: hsl(40 20% 98%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
        overflow: hidden;
      }

      .preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .preloader-content {
        text-align: center;
      }

      .preloader-logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        position: relative;
      }

      .preloader-logo .ring {
        position: absolute;
        inset: 0;
        border: 4px solid hsl(157 72% 37% / 0.2);
        border-radius: 50%;
      }

      .preloader-logo .spin {
        position: absolute;
        inset: 0;
        border: 4px solid hsl(157 72% 37%);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .preloader-logo .letter {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: bold;
        color: hsl(157 72% 37%);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .preloader-title {
        font-size: 20px;
        font-weight: 600;
        color: hsl(30 10% 12%);
        margin-bottom: 8px;
      }

      .preloader-subtitle {
        font-size: 12px;
        color: hsl(30 5% 50%);
        margin-bottom: 16px;
      }

    

    

      .preloader-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 16px;
      }

      .preloader-dots span {
        width: 6px;
        height: 6px;
        background: hsl(157 72% 37% / 0.6);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }

      .preloader-dots span:nth-child(1) {
        animation-delay: 0s;
      }
      .preloader-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .preloader-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-8px);
        }
      }
    </style>
  </head>
  <body>
    <!-- Preloader OUTSIDE root - so React doesn't replace it -->
    <div class="preloader" id="preloader">
      <div class="preloader-content">
        <div class="preloader-logo">
          <div class="ring"></div>
          <div class="spin"></div>
          <div class="letter">S</div>
        </div>
        <h2 class="preloader-title">Serene Hotel</h2>
        <p class="preloader-subtitle">Loading your experience...</p>
       
        <div class="preloader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <!-- Root for React app -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
